<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADSI — Social Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#eeede8;--surface3:#e5e4de;--border:rgba(0,0,0,0.07);--border-s:rgba(0,0,0,0.13);--text:#0f0f0e;--muted:#6b6b65;--dim:#a8a8a0;--accent:#1a1a18;--lime:#c8f135;--blue:#1877f2;--purple:#9333ea;--red:#ee1d52;--green:#16a34a;--danger:#dc2626;--r:14px;--rs:8px;--sw:230px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--accent);min-height:100vh;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sb-top{padding:28px 20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--lime);letter-spacing:-.02em;margin-bottom:2px}
.sb-sub{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:.06em;text-transform:uppercase}
.sb-nav{padding:16px 12px;flex:1}
.nav-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:0 10px;margin:14px 0 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'Manrope',sans-serif}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-item.active{background:var(--lime);color:var(--accent);font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-month{padding:16px;border-top:1px solid rgba(255,255,255,0.08)}
.mo-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:10px}
.mo-ctrl{display:flex;align-items:center;gap:6px}
.mo-arrow{width:30px;height:30px;background:rgba(255,255,255,0.08);border:none;border-radius:6px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.mo-arrow:hover{background:rgba(255,255,255,0.15);color:#fff}
.mo-name{flex:1;text-align:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff}
.add-mo{width:100%;margin-top:8px;padding:8px;background:none;border:1px dashed rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.35);font-size:12px;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s}
.add-mo:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.7)}
.sync-bar{padding:10px 16px;background:rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:rgba(255,255,255,0.3);display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0}
.sync-dot.ok{background:#4ade80}.sync-dot.err{background:#f87171}.sync-dot.loading{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;padding:36px 40px;overflow-x:hidden;min-width:0}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.03em;line-height:1.1}
.page-period{font-size:12px;color:var(--muted);margin-top:5px;font-weight:500}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .15s;border:none}
.btn-dark{background:var(--accent);color:#fff}.btn-dark:hover{background:#2d2d2a}
.btn-outline{background:none;border:1px solid var(--border-s);color:var(--muted)}.btn-outline:hover{background:var(--surface2);color:var(--text)}
.btn-lime{background:var(--lime);color:var(--accent)}.btn-lime:hover{background:#b8e020}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:var(--r);padding:18px 16px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent));border-radius:3px 3px 0 0}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text);letter-spacing:-.03em;line-height:1}
.kpi-delta{font-size:11px;margin-top:6px;font-family:'DM Mono',monospace;font-weight:500}
.d-up{color:var(--green)}.d-down{color:var(--danger)}.d-none{color:var(--dim)}
.section{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.sec-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.tbl-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:11px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:background .1s}
thead th:hover{background:var(--surface3)}
thead th.sort-on{color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:11px 14px;color:var(--text);vertical-align:middle}
tfoot td{padding:11px 14px;background:var(--surface2);border-top:1px solid var(--border-s);font-family:'DM Mono',monospace;font-weight:500;font-size:12px}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.post-ttl{max-width:220px}
.post-ttl-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;display:block;font-weight:500;font-size:12px}
.post-lnk{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--blue);text-decoration:none;margin-top:3px;font-weight:600}
.post-lnk:hover{text-decoration:underline}
.top-row td:first-child{position:relative}
.top-row td:first-child::before{content:'★';position:absolute;left:-2px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--lime)}
.upload-area{border:2px dashed var(--border-s);border-radius:var(--r);padding:32px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:var(--surface2)}
.upload-area input{display:none}
.up-icon{font-size:32px;margin-bottom:10px}
.up-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:5px}
.up-hint{font-size:12px;color:var(--muted)}
.up-cols{margin-top:10px;font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}
.cmp-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.cmp-controls select{padding:8px 12px;border-radius:8px;border:1px solid var(--border-s);background:var(--surface);font-family:'Manrope',sans-serif;font-size:13px;color:var(--text);cursor:pointer}
.vs-badge{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.1em}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.cmp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.cmp-metric{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.cmp-row{display:flex;justify-content:space-between;align-items:flex-end}
.cmp-period{font-size:10px;color:var(--dim);margin-bottom:3px}
.cmp-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text)}
.cmp-pct{padding:3px 9px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500;align-self:center}
.cmp-pct.up{background:#f0fdf4;color:var(--green)}.cmp-pct.down{background:#fef2f2;color:var(--danger)}.cmp-pct.flat{background:var(--surface2);color:var(--dim)}
.fol-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.fol-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center}
.fol-plat{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.fol-count{font-family:'DM Mono',monospace;font-size:30px;font-weight:500;letter-spacing:-.03em}
.fol-delta{font-size:12px;font-family:'DM Mono',monospace;margin-top:5px}
.inp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.inp-grp{display:flex;flex-direction:column;gap:5px}
.inp-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.inp-fld{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--rs);padding:9px 10px;font-size:13px;font-family:'DM Mono',monospace;color:var(--text);transition:border-color .15s;width:100%}
.inp-fld:focus{outline:none;border-color:var(--accent)}
.plat-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.plat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.plat-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.pill-fb{background:#eff6ff;color:var(--blue)}.pill-ig{background:#fdf4ff;color:var(--purple)}.pill-tt{background:#fff1f2;color:var(--red)}.pill-meta{background:#eff6ff;color:var(--blue)}.pill-tiktok{background:#fff1f2;color:var(--red)}
.data-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim)}
.dot{width:6px;height:6px;border-radius:50%}.dot-ok{background:var(--green)}.dot-no{background:var(--dim)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--muted)}
.loading-overlay{position:fixed;inset:0;background:rgba(245,244,240,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border-s);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--muted)}
@media print{.sidebar{display:none!important}.main{padding:20px}.no-print{display:none!important}.page{display:block!important}.tbl-wrap{border:1px solid #ccc}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading dashboard...</div>
</div>
<div class="app">
<aside class="sidebar">
  <div class="sb-top">
    <div class="sb-brand" id="brandName">BADSI</div>
    <div class="sb-sub">Social Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-lbl">Views</div>
    <button class="nav-item active" data-page="overview"><span class="nav-icon">◈</span> Overview</button>
    <button class="nav-item" data-page="facebook"><span class="nav-icon">ƒ</span> Facebook</button>
    <button class="nav-item" data-page="instagram"><span class="nav-icon">◎</span> Instagram</button>
    <button class="nav-item" data-page="tiktok"><span class="nav-icon">♦</span> TikTok</button>
    <button class="nav-item" data-page="ads"><span class="nav-icon">◐</span> Paid Ads</button>
    <div class="nav-lbl">Analysis</div>
    <button class="nav-item" data-page="compare"><span class="nav-icon">⇄</span> Compare</button>
    <div class="nav-lbl">Config</div>
    <button class="nav-item" data-page="settings"><span class="nav-icon">⊙</span> Settings</button>
  </nav>
  <div class="sb-month">
    <div class="mo-lbl">Reporting month</div>
    <div class="mo-ctrl">
      <button class="mo-arrow" id="prevMo">&#8249;</button>
      <div class="mo-name" id="moDsp">—</div>
      <button class="mo-arrow" id="nextMo">&#8250;</button>
    </div>
    <button class="add-mo" id="addMoBtn">+ Add month</button>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncTxt">Connecting...</span>
  </div>
</aside>
<main class="main">
  <div class="page active" id="page-overview">
    <div class="page-header">
      <div><div class="page-title" id="ov-title">Overview</div><div class="page-period" id="ov-period">—</div></div>
      <div class="header-actions no-print"><button class="btn btn-outline" onclick="window.print()">⬇ Download PDF</button></div>
    </div>
    <div id="ov-content"></div>
  </div>
  <div class="page" id="page-facebook">
    <div class="page-header">
      <div><div class="page-title">Facebook</div><div class="page-period" id="fb-period">—</div></div>
      <div class="header-actions no-print">
        <button class="btn btn-lime" onclick="triggerUpload('fb')">↑ Upload CSV</button>
        <input type="file" id="upload-fb" accept=".csv" style="display:none" onchange="handleCSV(event,'fb')">
      </div>
    </div>
    <div id="fb-content"></div>
  </div>
  <div class="page" id="page-instagram">
    <div class="page-header">
      <div><div class="page-title">Instagram</div><div class="page-period" id="ig-period">—</div></div>
      <div class="header-actions no-print">
        <button class="btn btn-lime" onclick="triggerUpload('ig')">↑ Upload CSV</button>
        <input type="file" id="upload-ig" accept=".csv" style="display:none" onchange="handleCSV(event,'ig')">
      </div>
    </div>
    <div id="ig-content"></div>
  </div>
  <div class="page" id="page-tiktok">
    <div class="page-header">
      <div><div class="page-title">TikTok</div><div class="page-period" id="tt-period">—</div></div>
      <div class="header-actions no-print">
        <button class="btn btn-lime" onclick="triggerUpload('tt')">↑ Upload CSV</button>
        <input type="file" id="upload-tt" accept=".csv" style="display:none" onchange="handleCSV(event,'tt')">
      </div>
    </div>
    <div id="tt-content"></div>
  </div>
  <div class="page" id="page-ads">
    <div class="page-header">
      <div><div class="page-title">Paid Ads</div><div class="page-period" id="ads-period">—</div></div>
      <div class="header-actions no-print"><button class="btn btn-dark" onclick="saveAds()">✓ Save</button></div>
    </div>
    <div id="ads-content"></div>
  </div>
  <div class="page" id="page-compare">
    <div class="page-header"><div><div class="page-title">Compare months</div></div></div>
    <div id="compare-content"></div>
  </div>
  <div class="page" id="page-settings">
    <div class="page-header"><div><div class="page-title">Settings</div></div></div>
    <div id="settings-content"></div>
  </div>
</main>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbwj5qkTC_dAkr272w6krxVSjGgAIRhnxZyjhhPUpiEs-YhyDdWBefjU9y9iq_7ZOa02/exec';
const SECRET='badsi2026';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let S={months:[],cur:0,data:{},clientName:'BADSI',currency:'€'};
let activePage='overview';
let sortState={};

function pad(n){return String(n).padStart(2,'0');}
function mk(){return S.months.length?S.months[S.cur].y+'-'+pad(S.months[S.cur].m):null;}
function ml(o){return MONTHS[o.m-1]+' '+o.y;}
function cd(){const k=mk();return k?(S.data[k]||(S.data[k]=em())):null;}
function em(){
  return{
    fb:{posts:[],followers:'',uploaded:false},
    ig:{posts:[],followers:'',uploaded:false},
    tt:{posts:[],followers:'',uploaded:false},
    ads:{meta:{spend:'',clicks:'',ctr:'',conversions:'',roas:'',uploaded:false},tiktok:{spend:'',clicks:'',ctr:'',conversions:'',roas:'',uploaded:false}}
  };
}

// ── API ──
function setSS(state,txt){document.getElementById('syncDot').className='sync-dot '+state;document.getElementById('syncTxt').textContent=txt;}
async function apiRead(){
  try{
    const r=await fetch(API_URL+'?action=read');
    const j=await r.json();
    if(j.ok){
      S.data=j.data||{};
      const keys=j.months||[];
      const ex=new Set(S.months.map(m=>m.y+'-'+pad(m.m)));
      keys.forEach(k=>{if(!ex.has(k)){const[y,m]=k.split('-');S.months.push({y:parseInt(y),m:parseInt(m)});ex.add(k);}});
      S.months.sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
      if(S.cur>=S.months.length)S.cur=Math.max(0,S.months.length-1);
      setSS('ok','Synced');
    }else{setSS('err','Sync error');}
  }catch(e){setSS('err','Offline');}
}
async function apiWrite(key,payload){
  setSS('loading','Saving...');
  try{
    const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'write',secret:SECRET,key,payload})});
    const j=await r.json();
    setSS(j.ok?'ok':'err',j.ok?'Saved ✓':'Save failed');
    return j.ok;
  }catch(e){setSS('err','Offline');return false;}
}
async function saveCur(){const k=mk();if(!k)return;if(!S.data[k])S.data[k]=em();await apiWrite(k,S.data[k]);}

// ── NAV ──
document.querySelectorAll('.nav-item[data-page]').forEach(btn=>{btn.addEventListener('click',()=>setPage(btn.dataset.page));});
function setPage(p){
  activePage=p;
  document.querySelectorAll('.nav-item[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  render();
}
document.getElementById('prevMo').onclick=()=>{S.cur=Math.max(0,S.cur-1);render();};
document.getElementById('nextMo').onclick=()=>{S.cur=Math.min(S.months.length-1,S.cur+1);render();};
document.getElementById('addMoBtn').onclick=addMonth;
function addMonth(){
  if(!S.months.length){const n=new Date();S.months.push({y:n.getFullYear(),m:n.getMonth()+1});S.cur=0;render();return;}
  const last=S.months[S.months.length-1];let m=last.m+1,y=last.y;if(m>12){m=1;y++;}
  if(S.months.find(x=>x.y===y&&x.m===m)){S.cur=S.months.findIndex(x=>x.y===y&&x.m===m);render();return;}
  S.months.push({y,m});S.cur=S.months.length-1;render();
}

// ── RENDER ──
function render(){
  const m=S.months[S.cur];
  document.getElementById('moDsp').textContent=m?MONTHS[m.m-1].slice(0,3)+' '+m.y:'—';
  if(activePage==='overview')renderOv();
  else if(activePage==='facebook')renderPlat('fb');
  else if(activePage==='instagram')renderPlat('ig');
  else if(activePage==='tiktok')renderPlat('tt');
  else if(activePage==='ads')renderAds();
  else if(activePage==='compare')renderCompare();
  else if(activePage==='settings')renderSettings();
}

function fN(v){const n=parseFloat(v);return isNaN(n)?'—':n.toLocaleString();}
function short(t){if(!t||t==='—')return'—';const s=t.replace(/\n/g,' ').trim();return s.length>60?s.slice(0,60)+'…':s;}

function kpi(label,value,delta,color){
  const dh=delta?`<div class="kpi-delta ${delta.cls}">${delta.txt}</div>`:'';
  return`<div class="kpi-card" style="--kc:${color||'var(--accent)'}"><div class="kpi-lbl">${label}</div><div class="kpi-val">${value}</div>${dh}</div>`;
}
function getDelta(c,p){
  const cv=parseFloat(c),pv=parseFloat(p);
  if(isNaN(cv)||isNaN(pv)||pv===0)return null;
  const pct=((cv-pv)/pv*100).toFixed(1);
  return{cls:cv>=pv?'d-up':'d-down',txt:(cv>=pv?'+':'')+pct+'% vs prev'};
}
function getPrev(){if(S.cur===0)return null;const pm=S.months[S.cur-1];return S.data[pm.y+'-'+pad(pm.m)]||null;}

function renderOv(){
  const d=cd(),m=S.months[S.cur];
  const el=document.getElementById('ov-content');
  document.getElementById('ov-title').textContent=(S.clientName||'BADSI')+' — Overview';

  if(!d){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No data yet</div><div class="empty-sub">Add a month and upload your CSVs.</div></div>';return;}
  const prev=getPrev();
  const ag=(pl)=>(d[pl].posts||[]).reduce((a,p)=>{['views','reach','reactions','likes','comments','shares','clicks','saves'].forEach(f=>{a[f]=(a[f]||0)+(parseFloat(p[f])||0);});return a;},{});
  const fb=ag('fb'),ig=ag('ig'),tt=ag('tt');
  const aV=fb.views+ig.views+tt.views;
  const aR=fb.reach+ig.reach+tt.reach;
  // engagement: FB uses reactions+comments+shares, IG uses likes+comments+shares+saves
  const aE=(fb.reactions+fb.comments+fb.shares)+(ig.likes+ig.comments+ig.shares+ig.saves)+(tt.reactions+tt.comments+tt.shares);
  const pag=(prev,pl)=>prev?(prev[pl].posts||[]).reduce((a,p)=>{['views','reach','reactions','likes','comments','shares'].forEach(f=>{a[f]=(a[f]||0)+(parseFloat(p[f])||0);});return a;},[]):null;
  const pfb=pag(prev,'fb'),pig=pag(prev,'ig'),ptt=pag(prev,'tt');
  const pV=pfb&&pig&&ptt?pfb.views+pig.views+ptt.views:null;
  const pR=pfb&&pig&&ptt?pfb.reach+pig.reach+ptt.reach:null;
  const pE=pfb&&pig&&ptt?(pfb.reactions+pfb.comments+pfb.shares)+(pig.likes+pig.comments+pig.shares)+(ptt.reactions+ptt.comments+ptt.shares):null;
  const fol=(pl)=>parseFloat(d[pl].followers)||0;
  const pfol=(pl)=>prev?parseFloat(prev[pl].followers)||0:null;
  const folD=(c,p)=>{if(p===null)return null;const diff=c-p;return{cls:diff>=0?'d-up':'d-down',txt:(diff>=0?'+':'')+diff.toLocaleString()+' followers'};};

  el.innerHTML=`
  <div class="kpi-row">
    ${kpi('Total views',fN(aV),getDelta(aV,pV),'#1a1a18')}
    ${kpi('Total reach',fN(aR),getDelta(aR,pR),'#2563eb')}
    ${kpi('Total engagement',fN(aE),getDelta(aE,pE),'#16a34a')}
    ${kpi('FB followers',fN(fol('fb')),folD(fol('fb'),pfol('fb')),'#1877f2')}
    ${kpi('IG followers',fN(fol('ig')),folD(fol('ig'),pfol('ig')),'#9333ea')}
    ${kpi('TT followers',fN(fol('tt')),folD(fol('tt'),pfol('tt')),'#ee1d52')}
  </div>
  <div class="section"><div class="sec-hdr"><div class="sec-title">Per platform — organic</div></div>
  <div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th>Platform</th><th>Views</th><th>Reach</th><th>Reactions/Likes</th><th>Comments</th><th>Shares</th><th>Saves</th><th>Clicks</th><th>Posts</th></tr></thead>
    <tbody>
      ${[['Facebook','fb','#1877f2'],['Instagram','ig','#9333ea'],['TikTok','tt','#ee1d52']].map(([n,pk,col])=>{
        const t=ag(pk);const cnt=(d[pk].posts||[]).length;
        const eng=pk==='ig'?t.likes:t.reactions;
        return`<tr><td><span style="font-weight:600;color:${col}">${n}</span></td>
          <td class="mono">${fN(t.views)}</td><td class="mono">${fN(t.reach)}</td>
          <td class="mono">${fN(eng)}</td><td class="mono">${fN(t.comments)}</td>
          <td class="mono">${fN(t.shares)}</td><td class="mono">${pk==='ig'?fN(t.saves):'—'}</td>
          <td class="mono">${pk==='ig'?'—':fN(t.clicks)}</td><td class="mono">${cnt}</td></tr>`;
      }).join('')}
    </tbody>
  </table></div></div></div>
  ${adsKpi(d)}`;
}

function adsKpi(d){
  const me=d.ads.meta,tk=d.ads.tiktok;
  if(!me.uploaded&&!tk.uploaded)return'';
  const ts=(parseFloat(me.spend)||0)+(parseFloat(tk.spend)||0);
  const tc=(parseFloat(me.clicks)||0)+(parseFloat(tk.clicks)||0);
  const tv=(parseFloat(me.conversions)||0)+(parseFloat(tk.conversions)||0);
  return`<div class="section"><div class="sec-hdr"><div class="sec-title">Paid Ads — combined</div></div>
  <div class="kpi-row">
    ${kpi('Total spend',ts?S.currency+ts.toLocaleString(undefined,{maximumFractionDigits:2}):'—',null,'#f59e0b')}
    ${kpi('Total clicks',fN(tc),null,'#f59e0b')}
    ${kpi('Total conversions',fN(tv),null,'#f59e0b')}

}

  return ['views','reach','reactions','comments','shares','clicks'];

function sortBy(plat,col){
  const sk='sort_'+plat;
  if(sortState[sk]&&sortState[sk].col===col){sortState[sk].dir=sortState[sk].dir==='desc'?'asc':'desc';}
  else{sortState[sk]={col,dir:'desc'};}
  renderPlat(plat);
}
function sortPosts(posts,col,dir){
  return[...posts].sort((a,b)=>{
    if(col==='post'){const va=a.title||'',vb=b.title||'';return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);}
    const va=parseFloat(a[col])||0,vb=parseFloat(b[col])||0;return dir==='asc'?va-vb:vb-va;
  });
}

// ── CSV PARSING ──
function triggerUpload(plat){const el=document.getElementById('upload-'+plat);if(el){el.value='';el.click();}}
async function clearPlat(plat){
  const k=mk();if(!k)return;
  if(!S.data[k])return;
  S.data[k][plat].posts=[];
  S.data[k][plat].uploaded=false;
  await saveCur();render();

function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag');}
function dragLeave(e){e.currentTarget.classList.remove('drag');}
function dropCSV(e,plat){e.preventDefault();e.currentTarget.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)parseCSVFile(f,plat);}
function handleCSV(event,plat){const f=event.target.files[0];if(!f)return;parseCSVFile(f,plat);}

function parseCSVFile(file,plat){
  const reader=new FileReader();
  reader.onload=async function(e){
    // Strip BOM if present
    let text=e.target.result;
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const rows=parseCSVFull(text);
    let posts; if(plat==='ig') posts=mapIGRows(rows); else if(plat==='tt') posts=mapTTRows(rows); else posts=mapFBRows(rows);
    const k=mk();if(!k)return;
    if(!S.data[k])S.data[k]=em();
    S.data[k][plat].posts=posts;
    S.data[k][plat].uploaded=true;
    await saveCur();render();
  };
  reader.readAsText(file);
}

// RFC 4180 compliant CSV parser — handles embedded newlines and quotes correctly
function parseCSVFull(text){
  const rows=[];
  let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];
    if(inQ){
      if(ch==='"'&&nx==='"'){cell+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else{cell+=ch;}
    } else {
      if(ch==='"'){inQ=true;}
      else if(ch===','){row.push(cell.trim());cell='';}
      else if(ch==='\r'&&nx==='\n'){row.push(cell.trim());rows.push(row);row=[];cell='';i++;}
      else if(ch==='\n'||ch==='\r'){row.push(cell.trim());rows.push(row);row=[];cell='';}
      else{cell+=ch;}
    }
  }
  if(cell||row.length)row.push(cell.trim()),rows.push(row);
  return rows.filter(r=>r.some(c=>c));
}

function mapFBRows(rows){
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.toLowerCase());
  const fi=(kws)=>{for(const kw of kws){const i=headers.findIndex(h=>h.includes(kw));if(i>=0)return i;}return -1;};

    if(p.views>0||p.reach>0||p.title)posts.push(p);
  }
  return posts;
}
